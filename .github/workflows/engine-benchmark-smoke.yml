name: Engine Benchmark Smoke

# SPEC 37 v0.7a Phase 0 deliverable 7 (2026-05-15). Compiles benchmarks
# on every PR that touches `packages/engine/**`, runs the cold-start
# benchmark to ensure scripts haven't bit-rotted, and uploads the JSON
# output as a build artifact for trend tracking.
#
# Pattern mirrored from MemWal:
# https://github.com/MystenLabs/MemWal/blob/dev/.github/workflows/benchmark-smoke.yml
#
# Phase 0 (this workflow): cold-start benchmark only. 1 sample / run.
# Phase 7: adds MemWal retrieval p95 measurement.
# Phase 8: expands into full perf regression suite (turn time p50/p95,
# first-token latency, tool dispatch latency) as the v0.7a acceptance gate.
#
# Path filter — only runs when the engine actually changes. PRs that
# only touch audric, gateway, or docs don't trigger this (saves CI minutes).

on:
  push:
    branches: [main]
    paths:
      - 'packages/engine/**'
      - 'packages/sdk/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/engine-benchmark-smoke.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/engine/**'
      - 'packages/sdk/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/engine-benchmark-smoke.yml'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Cancel previous benchmark runs on the SAME PR when a new commit lands.
# Main pushes get unique groups (per-ref) and never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  cold-start:
    name: Cold-start benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Build dependencies — engine import chain pulls in @t2000/sdk.
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/engine build

      - name: Run cold-start benchmark
        run: |
          pnpm --filter @t2000/engine exec tsx scripts/benchmark-cold-start.ts \
            > engine-benchmark-cold-start.json
          echo "::group::Benchmark result"
          cat engine-benchmark-cold-start.json
          echo "::endgroup::"

      # `if-no-files-found: ignore` per Phase 0 deliverable 7 — early
      # PRs may legitimately bypass the benchmark step (e.g. if a
      # follow-up commit fixes a build break). Don't fail the upload
      # step in that case.
      - name: Upload benchmark artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: engine-cold-start-${{ github.run_id }}-${{ github.run_attempt }}
          path: engine-benchmark-cold-start.json
          retention-days: 30
          if-no-files-found: ignore
