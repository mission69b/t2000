name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# SPEC 37 v0.7a Phase 0 deliverable 7 (2026-05-15): cancel previous CI runs
# when a new commit lands on the SAME PR. Main pushes get unique groups
# (per-ref) and never cancel each other. Saves CI minutes during PR
# iteration without risking half-merged main builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/mcp build
      # gateway imports @t2000/id (workspace) — build it before gateway typecheck
      - run: pnpm --filter @t2000/id build
      - run: pnpm --filter @t2000/sdk typecheck
      - run: pnpm --filter @t2000/mcp typecheck
      - run: pnpm --filter @t2000/cli typecheck
      # @t2000/web has no Prisma stack post-S.224 (Block C.2). gateway still
      # owns its own schema (MppPayment + ReputationCache) — its `typecheck`
      # script runs `prisma generate` first.
      - run: pnpm --filter @t2000/web typecheck
      - run: pnpm --filter gateway typecheck
      # Lint the published packages (the job's namesake — was previously
      # build+typecheck only). docs lint = mintlify/broken-links (network +
      # node-specific), kept out of code CI on purpose.
      - run: pnpm --filter @t2000/sdk lint
      - run: pnpm --filter @t2000/cli lint
      - run: pnpm --filter @t2000/mcp lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/mcp build
      # gateway imports @t2000/id (workspace) — build it before gateway test
      - run: pnpm --filter @t2000/id build
      - run: pnpm --filter @t2000/sdk test
      - run: pnpm --filter @t2000/mcp test
      - run: pnpm --filter @t2000/cli build
      - run: pnpm --filter @t2000/cli test
      - run: pnpm --filter @t2000/web test
      - run: pnpm --filter gateway test
