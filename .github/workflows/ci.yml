name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# SPEC 37 v0.7a Phase 0 deliverable 7 (2026-05-15): cancel previous CI runs
# when a new commit lands on the SAME PR. Main pushes get unique groups
# (per-ref) and never cancel each other. Saves CI minutes during PR
# iteration without risking half-merged main builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/engine build
      - run: pnpm --filter @t2000/mcp build
      - run: pnpm --filter @t2000/sdk typecheck
      - run: pnpm --filter @t2000/engine typecheck
      - run: pnpm --filter @t2000/mcp typecheck
      - run: pnpm --filter @t2000/cli typecheck
      # Each Prisma-using app's `typecheck` script runs `prisma generate` first
      # (the three apps share `node_modules/.prisma/client`, so order matters
      # — keep these sequential; running in parallel would clobber each other).
      - run: pnpm --filter @t2000/server typecheck
      - run: pnpm --filter @t2000/web typecheck
      - run: pnpm --filter gateway typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/engine build
      - run: pnpm --filter @t2000/mcp build
      - run: pnpm --filter @t2000/server exec prisma generate
      - run: pnpm --filter @t2000/sdk test
      - run: pnpm --filter @t2000/engine test
      - run: pnpm --filter @t2000/server test
      - run: pnpm --filter @t2000/mcp test
      - run: pnpm --filter @t2000/cli build
      - run: pnpm --filter @t2000/cli test
      - run: pnpm --filter @t2000/web test
      - run: pnpm --filter gateway test

  adapters:
    name: Adapter Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - name: Run adapter compliance tests
        run: pnpm --filter @t2000/sdk exec vitest run src/adapters/ --reporter=verbose
      - name: Run adapter contract tests
        run: pnpm --filter @t2000/sdk exec vitest run src/adapters/compliance.test.ts --reporter=verbose
