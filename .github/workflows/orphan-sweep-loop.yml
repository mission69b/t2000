name: Orphan Sweep Loop

# The post-change orphan + doc-staleness sweep loop (.cursor/rules/orphan-sweep.mdc),
# run via the Cursor CLI in print mode. The agent ONLY edits files; deterministic
# steps run the gate and push a gate-green branch + print a one-click PR link (the
# "restricted autonomy" split Cursor recommends for CI). Scope = t2000 only (CI checks out one repo); the private
# spec/ doc-staleness sweep is an occasional LOCAL run — see the skill.
#
# Setup (one-time): add a CURSOR_API_KEY repo secret
#   (Settings -> Secrets and variables -> Actions). Mint at cursor.com/dashboard/api
#   (a user key, or a team service-account key for shared CI).
# Optional: set a CURSOR_MODEL repo variable to pin a model (blank = account default).

on:
  workflow_dispatch: # manual first — prove one run before scheduling (loop playbook)
    inputs:
      model:
        description: "Cursor model id (blank = account default)"
        required: false
        default: ""
  # Enable AFTER manual runs are trusted:
  # schedule:
  #   - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: write # push the loop branch; we print a PR link rather than calling the PR API (org policy)

concurrency:
  group: orphan-sweep-loop
  cancel-in-progress: false

jobs:
  sweep:
    name: orphan + doc-staleness sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22 # matches .nvmrc; node 25+ breaks native deps
          cache: pnpm
      - run: pnpm install --frozen-lockfile # toolchain for the gate

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "$HOME/.cursor/bin" >> "$GITHUB_PATH"

      - name: Run maker agent (Cursor CLI, edits only)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_MODEL: ${{ inputs.model || vars.CURSOR_MODEL || '' }}
        run: |
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "CURSOR_API_KEY secret is not set — add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          MODEL_FLAG=""
          [ -n "${CURSOR_MODEL}" ] && MODEL_FLAG="--model ${CURSOR_MODEL}"
          agent -p --force --trust --output-format text $MODEL_FLAG "$(cat <<'PROMPT'
          You are the MAKER for t2000's orphan-sweep loop. Work surgically; stop at the gate.
          1. Read .cursor/rules/orphan-sweep.mdc (the procedure) and scripts/loops/orphan-sweep-STATE.md (memory) in full.
          2. Sweep t2000 for orphans + doc-staleness from recent removals: dead imports / unused exports, deleted dirs/symbols/deps still referenced, stale CI steps, and stale version numbers / tool counts / package lists in docs. Do NOT touch apps/web engine marketing (known-deferred per the STATE file).
          3. Make SURGICAL edits only — every changed line must trace to an orphan of a removal. Do NOT refactor adjacent code.
          4. Run: bash scripts/loops/orphan-sweep-gate.sh — iterate until it exits 0.
          5. Update scripts/loops/orphan-sweep-STATE.md (append a one-line lesson + refresh the "Last run" line).
          HARD RULES: never touch the money path (send/swap/pay/guards, packages/sdk/src/wallet/* execution) or make architecture/judgment changes — write those under "Open items" in the STATE file and STOP. Never edit anything under .github/workflows/ (sensitive CI; the runner token cannot push workflow changes — note any stale ref there under "Open items" and leave the file unchanged). Do NOT run git, commit, push, branch, or open PRs — only edit files; CI does the git.
          PROMPT
          )"

      - name: Strip any workflow-file edits (token can't push them)
        run: |
          git checkout -- .github/workflows/ 2>/dev/null || true
          git clean -fd .github/workflows/ 2>/dev/null || true

      - name: Gate (authoritative checker — no PR unless green)
        run: bash scripts/loops/orphan-sweep-gate.sh

      # Push the gate-green branch + print a one-click PR link. We do NOT use the
      # API to open the PR: the mission69b ORG disallows "Actions create/approve
      # PRs". Pushing a branch only needs contents:write (works under that policy).
      # To upgrade to a real auto-draft-PR, enable the org setting (see the skill)
      # and swap this step back to peter-evans/create-pull-request.
      - name: Push sweep branch + emit PR link (if anything changed)
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No orphans found — nothing to sweep. ✅" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          BRANCH="loop/orphan-sweep"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "🧹 chore(loop): orphan + doc-staleness sweep"
          git push -f origin "$BRANCH"
          URL="${{ github.server_url }}/${{ github.repository }}/compare/main...${BRANCH}?expand=1"
          {
            echo "### 🧹 Orphan sweep — changes ready for review"
            echo ""
            echo "The gate passed. **Review the diff, then open the PR:**"
            echo ""
            echo "[Open PR: main...${BRANCH}]($URL)"
            echo ""
            echo "See \`scripts/loops/orphan-sweep-STATE.md\` for what changed + the lesson recorded this run."
          } | tee -a "$GITHUB_STEP_SUMMARY"
