name: Sync Skills

on:
  push:
    branches: [main]
    paths:
      - 't2000-skills/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v6
        with:
          path: monorepo

      - name: Checkout skills repo
        uses: actions/checkout@v6
        with:
          repository: mission69b/t2000-skills
          token: ${{ secrets.SKILLS_SYNC_TOKEN }}
          path: skills-repo

      - name: Sync files
        run: |
          rsync -av --delete \
            --exclude='.git' \
            monorepo/t2000-skills/ skills-repo/

      - name: Push if changed
        working-directory: skills-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "sync: update skills from monorepo"
            git push
          fi
