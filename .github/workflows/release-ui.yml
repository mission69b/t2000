name: Release UI

# Independent release track for @t2000/ui — decoupled from the
# sdk/engine/cli/mcp lockstep release.yml because @t2000/ui versions
# follow its own cadence (design system iteration, not infra).
#
# Pipeline (single job, sequential):
#   1. Bump packages/ui/package.json by patch|minor|major
#   2. Commit + tag (`ui-vX.Y.Z`) + push to main
#   3. Install + build + typecheck + lint + test @t2000/ui
#   4. pnpm publish with npm provenance
#   5. Create GitHub Release tagged `ui-vX.Y.Z`

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-ui:
    name: Bump, Build, Publish & Release @t2000/ui
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump @t2000/ui version
        id: bump
        run: |
          BUMP="${{ inputs.bump }}"
          CURRENT=$(node -p "require('./packages/ui/package.json').version")
          IFS='.' read -r major minor patch <<< "$CURRENT"

          case "$BUMP" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          VERSION="$major.$minor.$patch"
          echo "Bumping @t2000/ui: $CURRENT → $VERSION"

          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('./packages/ui/package.json', 'utf8'));
            p.version = '$VERSION';
            fs.writeFileSync('./packages/ui/package.json', JSON.stringify(p, null, 2) + '\n');
          "

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify gates
        run: |
          pnpm --filter @t2000/ui typecheck
          pnpm --filter @t2000/ui lint
          pnpm --filter @t2000/ui test
          pnpm --filter @t2000/ui build

      - name: Commit & tag
        run: |
          VERSION="ui-v${{ steps.bump.outputs.version }}"
          git add -A
          git commit -m "📦 build(ui): ${VERSION}"
          git tag -a "$VERSION" -m "$VERSION"
          git push origin HEAD:refs/heads/main
          git push origin "refs/tags/$VERSION"

      # npm provenance — cryptographically links the published tarball to
      # this workflow run. Visible at
      # https://www.npmjs.com/package/@t2000/ui?activeTab=provenance
      - name: Publish to npm
        run: pnpm --filter @t2000/ui publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="ui-v${{ steps.bump.outputs.version }}"
          gh release create "$TAG" --generate-notes --title "$TAG"
