name: Deploy Indexer

on:
  workflow_dispatch:
    inputs:
      build-only:
        description: "Build & push only — skip ECS deploy"
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - "apps/server/src/indexer/**"
      - "apps/server/src/cron/**"
      - "apps/server/src/services/email.ts"
      - "apps/server/src/db/**"
      - "apps/server/prisma/**"
      - "infra/indexer*"
      - "infra/cron-daily-intel-task-definition.json"

concurrency:
  group: deploy-indexer
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECS_CLUSTER: mission69b-mainnet

jobs:
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/server exec prisma generate
      - run: pnpm --filter @t2000/server typecheck

  build:
    name: Build & Push
    needs: [check]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - name: Set image tag
        id: tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - uses: docker/setup-buildx-action@v4
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/indexer.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr.outputs.registry }}/t2000-indexer:${{ steps.tag.outputs.tag }}
            ${{ steps.ecr.outputs.registry }}/t2000-indexer:latest
          cache-from: type=gha,scope=t2000-indexer
          cache-to: type=gha,mode=max,scope=t2000-indexer
          provenance: false

  deploy:
    name: Deploy to ECS
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.build-only == true) }}
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Register task definition
        id: taskdef
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_BASE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/mission69b-mainnet-ecs-execution-role"
          sed \
            -e "s|\${AWS_ACCOUNT_ID}|$ACCOUNT_ID|g" \
            -e "s|\${AWS_REGION}|$AWS_REGION|g" \
            -e "s|\${ECR_BASE}|$ECR_BASE|g" \
            -e "s|\${EXEC_ROLE_ARN}|$ROLE_ARN|g" \
            -e "s|\${LOG_GROUP}|/ecs/mission69b-mainnet|g" \
            infra/indexer-task-definition.json > /tmp/task-def.json
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query "taskDefinition.taskDefinitionArn" --output text)
          echo "arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"
      - name: Deploy to ECS
        run: |
          SERVICE="t2000-indexer"
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=defaultForAz,Values=true" "Name=vpc-id,Values=$VPC_ID" --query "Subnets[*].SubnetId" --output json | jq -r 'join(",")')
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=tag:Name,Values=mission69b-mainnet-ecs-sg" "Name=vpc-id,Values=$VPC_ID" --query "SecurityGroups[0].GroupId" --output text)
          ACTIVE=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services "$SERVICE" --query "services[?status=='ACTIVE'] | length(@)" --output text 2>/dev/null || echo "0")
          if [ "$ACTIVE" -gt 0 ]; then
            aws ecs update-service --cluster ${{ env.ECS_CLUSTER }} --service "$SERVICE" --task-definition "${{ steps.taskdef.outputs.arn }}" --force-new-deployment --desired-count 1 > /dev/null
          else
            aws ecs create-service --cluster ${{ env.ECS_CLUSTER }} --service-name "$SERVICE" --task-definition "${{ steps.taskdef.outputs.arn }}" --desired-count 1 --capacity-provider-strategy "capacityProvider=FARGATE,weight=1" --network-configuration "awsvpcConfiguration={subnets=[$SUBNETS],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" --deployment-configuration "minimumHealthyPercent=0,maximumPercent=100" > /dev/null
          fi
          echo "Deployed $SERVICE"
      - name: Wait for stability
        run: |
          aws ecs wait services-stable --cluster ${{ env.ECS_CLUSTER }} --services t2000-indexer \
            && echo "Stable" || echo "Check ECS console"
      - name: Register cron task definitions + update EventBridge schedules
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_BASE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/mission69b-mainnet-ecs-execution-role"
          SCHEDULER_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/t2000-cron-scheduler-role"
          CLUSTER_ARN="arn:aws:ecs:$AWS_REGION:${ACCOUNT_ID}:cluster/${{ env.ECS_CLUSTER }}"
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)
          SUBNET_A=$(aws ec2 describe-subnets --filters "Name=defaultForAz,Values=true" "Name=vpc-id,Values=$VPC_ID" --query "Subnets[0].SubnetId" --output text)
          SUBNET_B=$(aws ec2 describe-subnets --filters "Name=defaultForAz,Values=true" "Name=vpc-id,Values=$VPC_ID" --query "Subnets[1].SubnetId" --output text)
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=tag:Name,Values=mission69b-mainnet-ecs-sg" "Name=vpc-id,Values=$VPC_ID" --query "SecurityGroups[0].GroupId" --output text)

          register_and_schedule() {
            local TASK_FILE="$1"
            local SCHEDULE_NAME="$2"
            local SCHEDULE_EXPR="$3"

            sed \
              -e "s|\${AWS_ACCOUNT_ID}|$ACCOUNT_ID|g" \
              -e "s|\${AWS_REGION}|$AWS_REGION|g" \
              -e "s|\${ECR_BASE}|$ECR_BASE|g" \
              -e "s|\${EXEC_ROLE_ARN}|$ROLE_ARN|g" \
              -e "s|\${LOG_GROUP}|/ecs/mission69b-mainnet|g" \
              "infra/$TASK_FILE" > "/tmp/$TASK_FILE"

            TASK_DEF_ARN=$(aws ecs register-task-definition \
              --cli-input-json "file:///tmp/$TASK_FILE" \
              --query "taskDefinition.taskDefinitionArn" --output text)
            echo "Registered: $TASK_DEF_ARN"

            local TARGET='{
                "RoleArn": "'"$SCHEDULER_ROLE_ARN"'",
                "Arn": "'"$CLUSTER_ARN"'",
                "EcsParameters": {
                  "TaskDefinitionArn": "'"$TASK_DEF_ARN"'",
                  "TaskCount": 1,
                  "LaunchType": "FARGATE",
                  "NetworkConfiguration": {
                    "awsvpcConfiguration": {
                      "Subnets": ["'"$SUBNET_A"'","'"$SUBNET_B"'"],
                      "SecurityGroups": ["'"$SG_ID"'"],
                      "AssignPublicIp": "ENABLED"
                    }
                  },
                  "PlatformVersion": "LATEST"
                }
              }'

            if aws scheduler get-schedule --name "$SCHEDULE_NAME" --group-name "default" > /dev/null 2>&1; then
              aws scheduler update-schedule \
                --name "$SCHEDULE_NAME" \
                --group-name "default" \
                --schedule-expression "$SCHEDULE_EXPR" \
                --schedule-expression-timezone "UTC" \
                --flexible-time-window '{"Mode": "OFF"}' \
                --target "$TARGET" \
                --state ENABLED
              echo "Updated schedule: $SCHEDULE_NAME"
            else
              aws scheduler create-schedule \
                --name "$SCHEDULE_NAME" \
                --group-name "default" \
                --schedule-expression "$SCHEDULE_EXPR" \
                --schedule-expression-timezone "UTC" \
                --flexible-time-window '{"Mode": "OFF"}' \
                --target "$TARGET" \
                --state ENABLED > /dev/null
              echo "Created schedule: $SCHEDULE_NAME"
            fi
          }

          # Note: t2000-cron-hourly and t2000-cron-daily-chain were retired
          # in the April 2026 simplification (see spec/SIMPLIFICATION_RATIONALE.md).
          # Only the daily-intel cron — silent context refresh for the engine —
          # survives. HF email alerts moved to a synchronous webhook.
          echo "--- Daily Intel (hours 7,19 UTC) ---"
          register_and_schedule "cron-daily-intel-task-definition.json" "t2000-cron-daily-intel" "cron(0 7,19 * * ? *)"

          echo "Cron task definition registered and schedule updated."
