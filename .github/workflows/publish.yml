name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/mcp build
      - run: pnpm --filter @t2000/id build
      - run: pnpm --filter @t2000/serve build
      - run: pnpm --filter @t2000/sdk typecheck
      - run: pnpm --filter @t2000/mcp typecheck
      - run: pnpm --filter @t2000/cli typecheck
      - run: pnpm --filter @t2000/id typecheck
      - run: pnpm --filter @t2000/serve typecheck
      - run: pnpm --filter @t2000/sdk test
      - run: pnpm --filter @t2000/mcp test
      - run: pnpm --filter @t2000/cli build
      - run: pnpm --filter @t2000/cli test
      - run: pnpm --filter @t2000/id test
      - run: pnpm --filter @t2000/serve test

  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/mcp build
      - run: pnpm --filter @t2000/cli build
      - run: pnpm --filter @t2000/id build
      - run: pnpm --filter @t2000/serve build

      # SPEC 37 v0.7a Phase 0 deliverable 7 (2026-05-15): npm provenance
      # adopted on all publish steps. Requires `id-token: write` on this
      # job (already set above). Provenance attestations are visible at
      # https://www.npmjs.com/package/@t2000/sdk?activeTab=provenance and
      # provide cryptographic linkage from the published tarball back to
      # the GitHub Actions run that produced it.
      - name: Publish @t2000/sdk
        run: pnpm --filter @t2000/sdk publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @t2000/mcp
        run: pnpm --filter @t2000/mcp publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @t2000/cli
        run: pnpm --filter @t2000/cli publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @t2000/id
        run: pnpm --filter @t2000/id publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @t2000/serve
        run: pnpm --filter @t2000/serve publish --no-git-checks --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - name: Determine version tag
        id: version
        run: |
          VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # We commit straight to main, so --generate-notes (PR-based) is empty.
          # Build grouped notes from our emoji-conventional commit messages.
          NOTES="$(bash scripts/release-notes.sh "$TAG" 2>/dev/null || true)"
          if [ -n "$NOTES" ]; then
            gh release create "$TAG" --title "$TAG" --notes "$NOTES" || true
          else
            gh release create "$TAG" --title "$TAG" --generate-notes || true
          fi

  discord:
    name: Discord Release Notification
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - name: Determine version tag
        id: ver
        run: |
          VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Get release info
        id: info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.tag }}"
          NOTES=$(gh release view "$VERSION" --json body -q .body | head -c 1800)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASES_WEBHOOK }}
          RELEASE_VERSION: ${{ steps.info.outputs.version }}
          RELEASE_NOTES: ${{ steps.info.outputs.notes }}
        run: |
          NOTES=$(printf '%s' "$RELEASE_NOTES" | head -c 1500)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          PAYLOAD=$(jq -n \
            --arg title "t2000 ${RELEASE_VERSION} released" \
            --arg url "https://github.com/mission69b/t2000/releases/tag/${RELEASE_VERSION}" \
            --arg desc "$NOTES" \
            --arg update '```npm update @t2000/cli -g```' \
            --arg links "[npm](https://www.npmjs.com/package/@t2000/cli) · [GitHub](https://github.com/mission69b/t2000/releases/tag/${RELEASE_VERSION}) · [Docs](https://t2000.ai/docs)" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{title: $title, url: $url, color: 55951, description: $desc, fields: [{name: "Update", value: $update, inline: false}, {name: "Links", value: $links, inline: false}], footer: {text: "t2000.ai"}, timestamp: $ts}]}')

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"
