name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/engine build
      - run: pnpm --filter @t2000/mcp build
      - run: pnpm --filter @t2000/server exec prisma generate
      - run: pnpm --filter @t2000/sdk typecheck
      - run: pnpm --filter @t2000/engine typecheck
      - run: pnpm --filter @t2000/mcp typecheck
      - run: pnpm --filter @t2000/server typecheck
      - run: pnpm --filter @t2000/cli typecheck
      - run: pnpm --filter @t2000/sdk test
      - run: pnpm --filter @t2000/engine test
      - run: pnpm --filter @t2000/server test
      - run: pnpm --filter @t2000/mcp test
      - run: pnpm --filter @t2000/cli build
      - run: pnpm --filter @t2000/cli test

  smoke:
    name: Mainnet Smoke Tests
    needs: ci
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - name: Run smoke tests
        run: pnpm --filter @t2000/sdk test:smoke
        env:
          SMOKE: '1'
          E2E_TEST_PRIVATE_KEY: ${{ secrets.E2E_TEST_PRIVATE_KEY }}

  publish:
    name: Publish to npm
    needs: [ci, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/engine build
      - run: pnpm --filter @t2000/mcp build
      - run: pnpm --filter @t2000/cli build

      - name: Publish @t2000/sdk
        run: pnpm --filter @t2000/sdk publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @t2000/mcp
        run: pnpm --filter @t2000/mcp publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @t2000/engine
        run: pnpm --filter @t2000/engine publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @t2000/cli
        run: pnpm --filter @t2000/cli publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - name: Determine version tag
        id: version
        run: |
          VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes --title "${{ steps.version.outputs.tag }}"

  discord:
    name: Discord Release Notification
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v5
      - name: Determine version tag
        id: ver
        run: |
          VERSION=$(node -p "require('./packages/sdk/package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Get release info
        id: info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.ver.outputs.tag }}"
          NOTES=$(gh release view "$VERSION" --json body -q .body | head -c 1800)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "notes<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_RELEASES_WEBHOOK }}
          RELEASE_VERSION: ${{ steps.info.outputs.version }}
          RELEASE_NOTES: ${{ steps.info.outputs.notes }}
        run: |
          NOTES=$(printf '%s' "$RELEASE_NOTES" | head -c 1500)
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          PAYLOAD=$(jq -n \
            --arg title "t2000 ${RELEASE_VERSION} released" \
            --arg url "https://github.com/mission69b/t2000/releases/tag/${RELEASE_VERSION}" \
            --arg desc "$NOTES" \
            --arg update '```npm update @t2000/cli -g```' \
            --arg links "[npm](https://www.npmjs.com/package/@t2000/cli) · [GitHub](https://github.com/mission69b/t2000/releases/tag/${RELEASE_VERSION}) · [Docs](https://t2000.ai/docs)" \
            --arg ts "$TIMESTAMP" \
            '{embeds: [{title: $title, url: $url, color: 55951, description: $desc, fields: [{name: "Update", value: $update, inline: false}, {name: "Links", value: $links, inline: false}], footer: {text: "t2000.ai"}, timestamp: $ts}]}')

          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL"
