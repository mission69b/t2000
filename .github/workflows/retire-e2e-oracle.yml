# One-shot (S.699 cleanup): deactivate the E2E Test Oracle's Agent ID using
# the E2E_TEST_PRIVATE_KEY secret. Delete this workflow after the run.
name: Retire E2E Oracle
on:
  workflow_dispatch:

jobs:
  retire:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      E2E_TEST_PRIVATE_KEY: ${{ secrets.E2E_TEST_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: npx tsx apps/gateway/scripts/retire-e2e-oracle.mts
