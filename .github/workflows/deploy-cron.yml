name: Deploy Cron

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/server/src/cron/**"
      - "apps/server/src/services/email.ts"
      - "infra/cron-task-definition.json"

concurrency:
  group: deploy-cron
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION: us-east-1
  ECS_CLUSTER: mission69b-mainnet

jobs:
  check:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @t2000/sdk build
      - run: pnpm --filter @t2000/server exec prisma generate
      - run: pnpm --filter @t2000/server typecheck

  deploy:
    name: Update task definition
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Register task definition
        id: taskdef
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_BASE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/mission69b-mainnet-ecs-execution-role"
          sed \
            -e "s|\${AWS_ACCOUNT_ID}|$ACCOUNT_ID|g" \
            -e "s|\${AWS_REGION}|$AWS_REGION|g" \
            -e "s|\${ECR_BASE}|$ECR_BASE|g" \
            -e "s|\${EXEC_ROLE_ARN}|$ROLE_ARN|g" \
            -e "s|\${LOG_GROUP}|/ecs/mission69b-mainnet|g" \
            infra/cron-task-definition.json > /tmp/task-def.json
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def.json \
            --query "taskDefinition.taskDefinitionArn" --output text)
          echo "arn=$TASK_DEF_ARN" >> "$GITHUB_OUTPUT"
          echo "Registered: $TASK_DEF_ARN"
      - name: Update EventBridge schedule target
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          SCHEDULE_NAME="t2000-cron-hourly"
          SCHEDULER_ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/t2000-cron-scheduler-role"
          CLUSTER_ARN="arn:aws:ecs:${{ env.AWS_REGION }}:${ACCOUNT_ID}:cluster/${{ env.ECS_CLUSTER }}"
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=defaultForAz,Values=true" --query "Subnets[*].SubnetId" --output json | jq -r '[.[0:2] | .[]] | join("\",\"")' )
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=tag:Name,Values=mission69b-mainnet-ecs-sg" --query "SecurityGroups[0].GroupId" --output text)
          aws scheduler update-schedule \
            --name "$SCHEDULE_NAME" \
            --group-name "default" \
            --schedule-expression "rate(1 hour)" \
            --flexible-time-window '{"Mode": "OFF"}' \
            --target '{
              "RoleArn": "'"$SCHEDULER_ROLE_ARN"'",
              "Arn": "'"$CLUSTER_ARN"'",
              "EcsParameters": {
                "TaskDefinitionArn": "${{ steps.taskdef.outputs.arn }}",
                "TaskCount": 1,
                "LaunchType": "FARGATE",
                "NetworkConfiguration": {
                  "awsvpcConfiguration": {
                    "Subnets": ["'"$SUBNETS"'"],
                    "SecurityGroups": ["'"$SG_ID"'"],
                    "AssignPublicIp": "ENABLED"
                  }
                },
                "PlatformVersion": "LATEST"
              }
            }' \
            --state ENABLED
          echo "Updated EventBridge schedule to use ${{ steps.taskdef.outputs.arn }}"
