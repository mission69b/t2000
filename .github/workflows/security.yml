name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# SPEC 37 v0.7a Phase 0 deliverable 7 (2026-05-15): cancel stale security
# scans on the same PR when a new commit lands. Main pushes / weekly
# cron get their own per-ref groups and never cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # SPEC 30 follow-up (2026-05-14): the audit step is now a real gate
      # at `--audit-level=critical` — fails the build on any critical
      # CVE in production deps. Lower-severity findings (high/moderate/
      # low) are still printed in the CI log via `--audit-level=low` for
      # visibility but do NOT fail the build, since the current baseline
      # is 19 high-sev findings — all transitive through @naviprotocol/
      # lending and @pythnetwork/pyth-sui-js (both upstream-owned, no
      # local fix path). Tightening to `--audit-level=high` requires
      # dropping @naviprotocol/lending — a separate cleanup. Until
      # then, this is the surgical move: keep the gate REAL on critical
      # while keeping CI green on the inherited backlog.
      - name: List known vulnerabilities (informational)
        run: pnpm audit --prod --audit-level=low || true
      - name: Fail on CRITICAL vulnerabilities (real gate)
        run: pnpm audit --prod --audit-level=critical
      - name: License compliance
        run: npx license-checker --production --failOn 'GPL-3.0;AGPL-3.0' || true

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
