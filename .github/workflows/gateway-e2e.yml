name: Gateway E2E
on:
  workflow_dispatch:
    inputs:
      gateway_url:
        description: 'Gateway URL to test against'
        default: 'https://mpp.t2000.ai'
        required: false
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

concurrency:
  group: gateway-e2e
  cancel-in-progress: true

jobs:
  e2e:
    name: MPP payment flow
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GATEWAY_URL: ${{ github.event.inputs.gateway_url || 'https://mpp.t2000.ai' }}
      E2E_TEST_PRIVATE_KEY: ${{ secrets.E2E_TEST_PRIVATE_KEY }}
      SUI_NETWORK: mainnet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run gateway e2e tests
        run: pnpm --filter @t2000/gateway test:e2e
        working-directory: .
