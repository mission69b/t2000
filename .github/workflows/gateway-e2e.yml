name: Gateway E2E
on:
  workflow_dispatch:
    inputs:
      gateway_url:
        description: 'Gateway URL to test against'
        default: 'https://mpp.t2000.ai'
        required: false
      mppsui_pr:
        description: 'mppsui PR number to test (e.g. "1"). Leave empty for published npm version.'
        default: ''
        required: false
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

concurrency:
  group: gateway-e2e
  cancel-in-progress: true

jobs:
  e2e:
    name: MPP payment flow
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GATEWAY_URL: ${{ github.event.inputs.gateway_url || 'https://mpp.t2000.ai' }}
      E2E_TEST_PRIVATE_KEY: ${{ secrets.E2E_TEST_PRIVATE_KEY }}
      SUI_NETWORK: mainnet

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Override @mppsui/mpp with PR build
        if: ${{ github.event.inputs.mppsui_pr != '' }}
        run: |
          git clone --depth 1 https://github.com/mission69b/mppsui.git /tmp/mppsui
          cd /tmp/mppsui
          git fetch origin pull/${{ github.event.inputs.mppsui_pr }}/head:pr-under-test
          git checkout pr-under-test
          pnpm install --no-frozen-lockfile
          pnpm --filter @mppsui/mpp build
          cd ${{ github.workspace }}
          pnpm --filter @t2000/gateway add @mppsui/mpp@file:/tmp/mppsui/packages/mpp

      - name: Run gateway e2e tests
        run: pnpm --filter @t2000/gateway test:e2e
