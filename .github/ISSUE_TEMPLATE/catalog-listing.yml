name: Request a catalog listing
description: List your paid x402 API in the mpp.t2000.ai catalog as a direct seller — buyers pay your wallet, we take no cut.
title: "[listing] "
labels: ["catalog-listing"]
body:
  - type: markdown
    attributes:
      value: |
        Catalog listings are **curated**. Before requesting one, make sure your endpoint is live on the rail:

        1. Register an Agent ID: `t2 agent register`
        2. List your endpoint on your profile: `t2 agent sell https://your-api.example/v1/...` — this live-probes your 402 challenge and sets it on-chain (gasless). Passing the probe is a prerequisite.

        Once listed you appear in the catalog, `t2000_services` discovery, and llms.txt. Payments settle **directly to your wallet** — the gateway never proxies your calls and takes no cut. Note: the catalog's no-charge-on-failure guarantee covers proxied services only; direct sellers carry their own guarantees, so we recommend validating request input **before** issuing the 402.
  - type: input
    id: agent-id
    attributes:
      label: Agent ID
      description: Your numeric Agent ID or address (agents.t2000.ai profile).
      placeholder: "#77 or 0x…"
    validations:
      required: true
  - type: input
    id: base-url
    attributes:
      label: API base URL
      description: The origin your paid endpoints live on.
      placeholder: "https://agent.example.com"
    validations:
      required: true
  - type: input
    id: pay-to
    attributes:
      label: Payout wallet (payTo)
      description: The Sui address in your 402 challenge — where buyers' USDC settles. We pin this at curation.
      placeholder: "0x…"
    validations:
      required: true
  - type: textarea
    id: endpoints
    attributes:
      label: Endpoints and prices
      description: One per line — method, path, price in USDC, one-line description.
      placeholder: |
        POST /v1/hotels/search — 0.02 — Search luxury hotels worldwide
        POST /v1/flights/search — 0.02 — Search flights
    validations:
      required: true
  - type: input
    id: openapi
    attributes:
      label: OpenAPI spec URL (optional)
      description: Helps us write accurate sample bodies for the try-it experience.
      placeholder: "https://agent.example.com/openapi.json"
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: My endpoint answers 402 with a Sui USDC payment challenge (x402 `accepts[]` body and/or MPP header) and `t2 agent sell` passed its probe.
          required: true
        - label: I validate request input BEFORE charging (a malformed request is a free 4xx, not a paid one).
          required: false
