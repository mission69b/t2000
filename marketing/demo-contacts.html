<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>t2000 — Contacts</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #040406;
  --surface: #080a0f;
  --panel: #0d1018;
  --border: rgba(255,255,255,0.07);
  --border-b: rgba(255,255,255,0.14);
  --fg: #e8e6e0;
  --muted: #5a6070;
  --dim: #333844;
  --accent: #00d68f;
  --accent-dim: rgba(0,214,143,0.12);
  --accent-glow: rgba(0,214,143,0.25);
  --blue: #4a90e2;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'IBM Plex Mono', monospace;
  overflow: hidden;
  width: 1280px;
  height: 720px;
  position: relative;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 2; opacity: 0.4;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
  pointer-events: none; z-index: 2;
}

.scene {
  position: absolute; inset: 0; z-index: 1;
  opacity: 0;
  transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column;
}
.scene.active { opacity: 1; }

.card-main {
  font-family: 'Instrument Serif', serif;
  font-size: 68px;
  font-weight: 400;
  font-style: italic;
  color: var(--fg);
  text-align: center;
  line-height: 1.15;
  max-width: 850px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}
.card-main.in { opacity: 1; transform: translateY(0); }

.card-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  color: var(--muted);
  margin-top: 24px;
  text-align: center;
  letter-spacing: 0.5px;
  opacity: 0;
  transition: opacity 0.6s ease 0.4s;
}
.card-sub.in { opacity: 1; }

.chat-frame {
  width: 860px;
  height: 480px;
  background: var(--surface);
  border: 1px solid var(--border-b);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 80px rgba(0,214,143,0.03);
  opacity: 0; transform: scale(0.96);
  transition: opacity 0.6s ease, transform 0.6s ease;
  display: flex;
  flex-direction: column;
}
.chat-frame.in { opacity: 1; transform: scale(1); }

.chat-body {
  padding: 24px 28px;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  overflow: hidden;
}

.msg {
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.4s ease, transform 0.4s ease;
  margin-bottom: 16px;
  display: flex; gap: 10px;
}
.msg.v { opacity: 1; transform: translateY(0); }

.msg-user { justify-content: flex-end; }
.msg-user .bubble {
  background: var(--accent);
  color: #000;
  border-radius: 16px 16px 4px 16px;
  padding: 12px 18px;
  font-size: 14px;
  font-weight: 500;
  max-width: 72%;
  font-family: 'IBM Plex Mono', monospace;
  box-shadow: 0 2px 16px rgba(0,214,143,0.12);
}

.msg-ai { align-items: flex-start; }
.msg-ai .avatar {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--panel);
  border: 1px solid var(--border-b);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600;
  color: var(--accent);
  flex-shrink: 0;
  margin-top: 2px;
}
.msg-ai .content { max-width: 80%; }
.msg-ai .bubble {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px 16px 16px 16px;
  padding: 14px 18px;
  font-size: 13px;
  line-height: 1.7;
  font-family: 'IBM Plex Mono', monospace;
}

.tools-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
.tool-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; padding: 3px 9px; border-radius: 4px;
  background: var(--accent-dim); color: var(--accent);
  opacity: 0; transition: opacity 0.3s ease;
}
.tool-pill.v { opacity: 1; }

.thinking-dots { display: flex; gap: 4px; padding: 10px 0; }
.thinking-dots span {
  width: 6px; height: 6px; background: var(--accent);
  border-radius: 50%; opacity: 0.3;
  animation: p 1.4s ease-in-out infinite;
}
.thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
.thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes p { 0%,100%{opacity:.2;transform:scale(.8)} 50%{opacity:1;transform:scale(1)} }

.rt { width: 100%; border-collapse: collapse; }
.rt td { padding: 5px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
.rt td:first-child { color: var(--muted); width: 130px; }
.rt td:last-child { font-weight: 500; }
.hi { color: var(--accent); font-weight: 600; }

.nt { margin-top: 10px; color: var(--muted); font-size: 11px; line-height: 1.5; }

#outro .logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 80px; font-weight: 600;
  color: var(--accent); letter-spacing: -3px;
  text-shadow: 0 0 80px var(--accent-glow);
  opacity: 0; transform: translateY(15px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}
#outro .logo.in { opacity: 1; transform: translateY(0); }
#outro .tagline {
  font-family: 'Instrument Serif', serif;
  font-style: italic;
  font-size: 22px; color: var(--muted);
  margin-top: 12px;
  opacity: 0; transition: opacity 0.7s ease 0.3s;
}
#outro .tagline.in { opacity: 1; }
#outro .cmd {
  font-size: 16px; color: var(--accent);
  background: var(--accent-dim);
  padding: 14px 28px; border-radius: 8px;
  border: 1px solid rgba(0,214,143,0.1);
  margin-top: 28px;
  opacity: 0; transition: opacity 0.7s ease 0.5s;
}
#outro .cmd.in { opacity: 1; }
#outro .links {
  font-size: 13px; color: var(--dim);
  margin-top: 20px; letter-spacing: 0.3px;
  opacity: 0; transition: opacity 0.7s ease 0.7s;
}
#outro .links.in { opacity: 1; }

.ctrl { position: fixed; bottom: 14px; right: 14px; z-index: 100; }
.ctrl button {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; padding: 6px 14px;
  background: var(--panel); color: var(--dim);
  border: 1px solid var(--border-b); border-radius: 6px;
  cursor: pointer;
}
.ctrl button:hover { color: var(--accent); border-color: var(--accent); }
</style>
</head>
<body>

<!-- 1. Send money by name -->
<div id="s1" class="scene active">
  <div class="card-main">Send money<br>by name.</div>
  <div class="card-sub">contacts · locally stored · zero friction</div>
</div>

<!-- 2. Chat: Add contact + List + Send -->
<div id="s2" class="scene">
  <div class="chat-frame" id="cf2"><div class="chat-body" id="cb2"></div></div>
</div>

<!-- 3. Card: No more raw addresses -->
<div id="s3" class="scene">
  <div class="card-main">No more copying<br>raw addresses.</div>
</div>

<!-- 4. Outro -->
<div id="outro" class="scene">
  <div class="logo">t2000</div>
  <div class="tagline">The first bank account for AI agents.</div>
  <div class="cmd">npm i -g @t2000/cli && t2000 mcp install</div>
  <div class="links">t2000.ai · v0.13.0 · contacts</div>
</div>

<div class="ctrl"><button onclick="location.reload()">↻ Replay</button></div>

<script>
const $ = s => document.querySelector(s);
const sleep = ms => new Promise(r => setTimeout(r, ms));

function show(id) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function addUserMsg(parent, text) {
  const msg = document.createElement('div');
  msg.className = 'msg msg-user';
  msg.innerHTML = `<div class="bubble">${text}</div>`;
  parent.appendChild(msg);
  return msg;
}

function addAIMsg(parent, html, tools, isErr) {
  const msg = document.createElement('div');
  msg.className = 'msg msg-ai';
  let inner = '<div class="avatar">t</div><div class="content">';
  if (tools) {
    inner += '<div class="tools-row">';
    tools.forEach(t => {
      const fail = t.startsWith('\u2715');
      inner += `<span class="tool-pill${fail ? ' fail' : ''}">${fail ? t.slice(2) : t}</span>`;
    });
    inner += '</div>';
  }
  inner += `<div class="bubble${isErr ? ' err' : ''}">${html}</div></div>`;
  msg.innerHTML = inner;
  parent.appendChild(msg);
  return msg;
}

function addThinking(parent) {
  const msg = document.createElement('div');
  msg.className = 'msg msg-ai';
  msg.innerHTML = '<div class="avatar">t</div><div class="thinking-dots"><span></span><span></span><span></span></div>';
  parent.appendChild(msg);
  return msg;
}

async function anim(msg, delay = 50) {
  await sleep(delay);
  msg.classList.add('v');
  const pills = msg.querySelectorAll('.tool-pill');
  for (const pill of pills) { await sleep(100); pill.classList.add('v'); }
}

async function showChat(frameId, bodyId, messages) {
  const frame = $(frameId);
  const body = $(bodyId);
  frame.classList.add('in');
  await sleep(500);
  for (const m of messages) {
    if (m.type === 'user') {
      const msg = addUserMsg(body, m.text);
      await anim(msg);
      await sleep(400);
    } else if (m.type === 'think') {
      const t = addThinking(body);
      await sleep(50); t.classList.add('v');
      await sleep(m.ms || 1000);
      t.remove();
    } else {
      const msg = addAIMsg(body, m.html, m.tools, m.err);
      await anim(msg);
      await sleep(m.hold || 600);
    }
  }
}

async function showCard(id, holdMs = 2800) {
  show(id);
  await sleep(200);
  const main = $(`${id} .card-main`);
  const sub = $(`${id} .card-sub`);
  if (main) main.classList.add('in');
  if (sub) sub.classList.add('in');
  await sleep(holdMs);
}

async function run() {

  // 1. Send money by name
  await showCard('#s1', 3000);

  // 2. Chat: Add alice, show contacts, send to alice
  show('#s2');
  await showChat('#cf2', '#cb2', [
    { type: 'user', text: "Add alice as a contact \u2014 0x8b3e\u2026d412" },
    { type: 'think', ms: 800 },
    { type: 'ai', tools: ['t2000_contacts'],
      html: `<table class="rt">
        <tr><td>Saved</td><td class="hi">alice \u2192 0x8b3e\u2026d412</td></tr>
      </table>
      <div class="nt">You can now send money with just their name.</div>`,
      hold: 1200
    },
    { type: 'user', text: "Show my contacts" },
    { type: 'think', ms: 600 },
    { type: 'ai', tools: ['t2000_contacts'],
      html: `<table class="rt">
        <tr><td>alice</td><td>0x8b3e\u2026d412</td></tr>
      </table>`,
      hold: 1200
    },
    { type: 'user', text: "Send $5 to alice" },
    { type: 'think', ms: 1000 },
    { type: 'ai', tools: ['t2000_contacts', 't2000_send'],
      html: `<table class="rt">
        <tr><td>To</td><td class="hi">alice \u2192 0x8b3e\u2026d412</td></tr>
        <tr><td>Amount</td><td class="hi">$5.00 USDC</td></tr>
        <tr><td>Balance after</td><td>$81.81</td></tr>
        <tr><td>Tx</td><td><span style="color:var(--blue)">suiscan.xyz/tx/Gd2n\u2026</span></td></tr>
      </table>
      <div class="nt">Resolved "alice" from contacts. No address needed.</div>`,
      hold: 2000
    },
  ]);
  await sleep(800);

  // 3. No more copying raw addresses
  await showCard('#s3', 2500);

  // 4. Outro
  show('#outro');
  await sleep(300);
  $('#outro .logo').classList.add('in');
  await sleep(150);
  $('#outro .tagline').classList.add('in');
  await sleep(150);
  $('#outro .cmd').classList.add('in');
  await sleep(150);
  $('#outro .links').classList.add('in');

  await sleep(5000);

  document.querySelectorAll('.chat-body').forEach(b => b.innerHTML = '');
  document.querySelectorAll('.chat-frame').forEach(f => f.classList.remove('in'));
  document.querySelectorAll('[class*="in"]').forEach(el => {
    if (el.closest('#outro')) el.classList.remove('in');
  });

  run();
}

run();
</script>
</body>
</html>
